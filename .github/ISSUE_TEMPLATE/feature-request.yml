name: Feature request
description: 新功能或产品建议
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 影响范围
      description: 公开接口、维护接口、来源适配、前端体验等
