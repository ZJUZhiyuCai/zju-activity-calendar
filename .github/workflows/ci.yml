name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: we-mp-rss
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: pip install -r requirements.txt
      - name: Compile backend modules
        run: python -m py_compile main.py apis/sys_info.py apis/zju_activity.py core/activity_service.py core/zju_activity.py tests/test_open_source_runtime.py tests/test_activity_service_unit.py
      - name: Run backend tests
        run: python -m unittest discover -s tests

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Run frontend smoke tests
        run: npm run test:smoke
      - name: Build frontend
        run: npm run build
