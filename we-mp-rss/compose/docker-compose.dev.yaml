services:
  redis:
    image: docker.1ms.run/redis:7-alpine
    container_name: zju-activity-calendar-redis-dev
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    image: zju-activity-calendar-data:dev
    container_name: zju-activity-calendar-backend-dev
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      START_MODE: all
      DB: sqlite:///data/we_mp_rss.db
      REDIS_ENABLED: "True"
      REDIS_URL: redis://redis:6379/0
      PROXY_HTTP_URL: http://singbox:7890
    ports:
      - "8001:8001"
    volumes:
      - ../apis:/app/apis
      - ../core:/app/core
      - ../driver:/app/driver
      - ../jobs:/app/jobs
      - ../migrations:/app/migrations
      - ../schemas:/app/schemas
      - ../tools:/app/tools
      - ../static:/app/static
      - ../main.py:/app/main.py
      - ../web.py:/app/web.py
      - ../config.yaml:/app/config.yaml
      - ../data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      singbox:
        condition: service_started

  singbox:
    image: ghcr.io/sagernet/sing-box:latest
    container_name: zju-activity-calendar-singbox-dev
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      SINGBOX_INBOUND_PORT: 7890
      SINGBOX_LOG_LEVEL: info
    entrypoint:
      - /bin/sh
      - /etc/sing-box/run-singbox.sh
    volumes:
      - ./singbox/run-singbox.sh:/etc/sing-box/run-singbox.sh:ro

volumes:
  redis_data:
